<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MetaPhase</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Space+Mono:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0d0d0d;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Space Mono', monospace;
    overflow: hidden;
  }

  .scene {
    position: relative;
    width: 420px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .smoke-container {
    position: relative;
    width: 300px;
    height: 160px;
    margin-bottom: -10px;
  }

  .puff {
    position: absolute;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(120,120,120,0.5) 0%, rgba(60,60,60,0.1) 70%, transparent 100%);
    animation: rise linear infinite;
    filter: blur(6px);
  }

  .puff:nth-child(1) { width: 70px; height: 70px; left: 100px; animation-duration: 3.2s; animation-delay: 0s; }
  .puff:nth-child(2) { width: 55px; height: 55px; left: 130px; animation-duration: 2.8s; animation-delay: 0.6s; }
  .puff:nth-child(3) { width: 85px; height: 85px; left: 80px; animation-duration: 3.6s; animation-delay: 1.2s; }
  .puff:nth-child(4) { width: 60px; height: 60px; left: 150px; animation-duration: 3s; animation-delay: 1.8s; }
  .puff:nth-child(5) { width: 50px; height: 50px; left: 110px; animation-duration: 2.5s; animation-delay: 0.4s; }

  @keyframes rise {
    0%   { transform: translateY(160px) translateX(0) scale(0.4); opacity: 0; }
    15%  { opacity: 0.7; }
    60%  { transform: translateY(50px) translateX(20px) scale(1.2); opacity: 0.4; }
    100% { transform: translateY(-20px) translateX(-10px) scale(1.6); opacity: 0; }
  }

  .dumpster-wrap {
    position: relative;
    width: 280px;
  }

  .dumpster {
    width: 280px;
    height: 170px;
    background: linear-gradient(160deg, #3a3a3a 0%, #1e1e1e 60%, #111 100%);
    border-radius: 6px 6px 14px 14px;
    border: 3px solid #555;
    border-top: none;
    position: relative;
    box-shadow: inset -8px 0 20px rgba(0,0,0,0.6), 0 10px 40px rgba(0,0,0,0.8);
    overflow: hidden;
  }

  .dumpster-label {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    pointer-events: none;
  }

  .dumpster-label .mp-name {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 1.05rem;
    letter-spacing: 0.12em;
    color: rgba(255,255,255,0.12);
    text-transform: uppercase;
    line-height: 1;
  }

  .dumpster-label .mp-tag {
    font-size: 0.45rem;
    letter-spacing: 0.3em;
    color: rgba(255,255,255,0.07);
    text-transform: uppercase;
    margin-top: 3px;
  }

  .dumpster::before {
    content: '';
    position: absolute;
    left: 50%;
    top: 20px;
    bottom: 20px;
    width: 3px;
    background: rgba(0,0,0,0.4);
    border-radius: 2px;
  }
  .dumpster::after {
    content: '';
    position: absolute;
    left: 25%;
    right: 25%;
    top: 50%;
    height: 3px;
    background: rgba(0,0,0,0.3);
    border-radius: 2px;
  }

  .lid {
    width: 300px;
    height: 28px;
    background: linear-gradient(180deg, #555 0%, #333 100%);
    border-radius: 8px 8px 0 0;
    border: 3px solid #666;
    border-bottom: none;
    margin-left: -13px;
    position: relative;
    transform-origin: center bottom;
    animation: lidRattle 0.4s ease-in-out infinite alternate;
  }

  @keyframes lidRattle {
    0%   { transform: rotate(-2deg) translateY(0px); }
    100% { transform: rotate(1.5deg) translateY(-3px); }
  }

  .lid-handle {
    width: 50px;
    height: 10px;
    background: #444;
    border: 2px solid #666;
    border-radius: 4px;
    position: absolute;
    top: -8px;
    left: 50%;
    transform: translateX(-50%);
  }

  .flames {
    position: absolute;
    bottom: 100%;
    left: 50%;
    transform: translateX(-50%);
    width: 260px;
    height: 130px;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    gap: 4px;
    pointer-events: none;
  }
