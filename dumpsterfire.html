<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MetaPhase</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Space+Mono:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0d0d0d;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Space Mono', monospace;
    overflow: hidden;
  }

  .scene {
    position: relative;
    width: 420px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .smoke-container {
    position: relative;
    width: 300px;
    height: 160px;
    margin-bottom: -10px;
  }

  .puff {
    position: absolute;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(120,120,120,0.5) 0%, rgba(60,60,60,0.1) 70%, transparent 100%);
    animation: rise linear infinite;
    filter: blur(6px);
  }

  .puff:nth-child(1) { width: 70px; height: 70px; left: 100px; animation-duration: 3.2s; animation-delay: 0s; }
  .puff:nth-child(2) { width: 55px; height: 55px; left: 130px; animation-duration: 2.8s; animation-delay: 0.6s; }
  .puff:nth-child(3) { width: 85px; height: 85px; left: 80px; animation-duration: 3.6s; animation-delay: 1.2s; }
  .puff:nth-child(4) { width: 60px; height: 60px; left: 150px; animation-duration: 3s; animation-delay: 1.8s; }
  .puff:nth-child(5) { width: 50px; height: 50px; left: 110px; animation-duration: 2.5s; animation-delay: 0.4s; }

  @keyframes rise {
    0%   { transform: translateY(160px) translateX(0) scale(0.4); opacity: 0; }
    15%  { opacity: 0.7; }
    60%  { transform: translateY(50px) translateX(20px) scale(1.2); opacity: 0.4; }
    100% { transform: translateY(-20px) translateX(-10px) scale(1.6); opacity: 0; }
  }

  .dumpster-wrap {
    position: relative;
    width: 280px;
  }

  .dumpster {
    width: 280px;
    height: 170px;
    background: linear-gradient(160deg, #3a3a3a 0%, #1e1e1e 60%, #111 100%);
    border-radius: 6px 6px 14px 14px;
    border: 3px solid #555;
    border-top: none;
    position: relative;
    box-shadow: inset -8px 0 20px rgba(0,0,0,0.6), 0 10px 40px rgba(0,0,0,0.8);
    overflow: hidden;
  }

  .dumpster-label {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    pointer-events: none;
  }

  .dumpster-label .mp-name {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 1.05rem;
    letter-spacing: 0.12em;
    color: rgba(255,255,255,0.12);
    text-transform: uppercase;
    line-height: 1;
  }

  .dumpster-label .mp-tag {
    font-size: 0.45rem;
    letter-spacing: 0.3em;
    color: rgba(255,255,255,0.07);
    text-transform: uppercase;
    margin-top: 3px;
  }

  .dumpster::before {
    content: '';
    position: absolute;
    left: 50%;
    top: 20px;
    bottom: 20px;
    width: 3px;
    background: rgba(0,0,0,0.4);
    border-radius: 2px;
  }
  .dumpster::after {
    content: '';
    position: absolute;
    left: 25%;
    right: 25%;
    top: 50%;
    height: 3px;
    background: rgba(0,0,0,0.3);
    border-radius: 2px;
  }

  .lid {
    width: 300px;
    height: 28px;
    background: linear-gradient(180deg, #555 0%, #333 100%);
    border-radius: 8px 8px 0 0;
    border: 3px solid #666;
    border-bottom: none;
    margin-left: -13px;
    position: relative;
    transform-origin: center bottom;
    animation: lidRattle 0.4s ease-in-out infinite alternate;
  }

  @keyframes lidRattle {
    0%   { transform: rotate(-2deg) translateY(0px); }
    100% { transform: rotate(1.5deg) translateY(-3px); }
  }

  .lid-handle {
    width: 50px;
    height: 10px;
    background: #444;
    border: 2px solid #666;
    border-radius: 4px;
    position: absolute;
    top: -8px;
    left: 50%;
    transform: translateX(-50%);
  }

  .flames {
    position: absolute;
    bottom: 100%;
    left: 50%;
    transform: translateX(-50%);
    width: 260px;
    height: 130px;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    gap: 4px;
    pointer-events: none;
  }

  .flame {
    position: relative;
    border-radius: 50% 50% 20% 20%;
    transform-origin: bottom center;
    animation: flicker ease-in-out infinite alternate;
    flex-shrink: 0;
  }

  .flame.o1 { width: 44px; height: 90px; background: linear-gradient(to top, #ff6a00, #ff3d00, #ff8c00); animation-duration: 0.35s; animation-delay: 0s; }
  .flame.o2 { width: 38px; height: 75px; background: linear-gradient(to top, #ff5500, #ff2200, #ff7700); animation-duration: 0.28s; animation-delay: 0.07s; }
  .flame.o3 { width: 48px; height: 100px; background: linear-gradient(to top, #ff6a00, #ff4400, #ff9900); animation-duration: 0.42s; animation-delay: 0.14s; }
  .flame.o4 { width: 36px; height: 70px; background: linear-gradient(to top, #ff5000, #ff2800, #ff6600); animation-duration: 0.31s; animation-delay: 0.05s; }
  .flame.o5 { width: 42px; height: 85px; background: linear-gradient(to top, #ff6000, #ff3300, #ff8000); animation-duration: 0.38s; animation-delay: 0.18s; }

  .flame.i1 { width: 24px; height: 65px; background: linear-gradient(to top, #ffcc00, #ffee44, #fff9c4); animation-duration: 0.22s; animation-delay: 0.03s; position: absolute; bottom: 0; left: 30px; }
  .flame.i2 { width: 28px; height: 80px; background: linear-gradient(to top, #ffaa00, #ffdd00, #fffde7); animation-duration: 0.25s; animation-delay: 0.1s; position: absolute; bottom: 0; left: 100px; }
  .flame.i3 { width: 22px; height: 60px; background: linear-gradient(to top, #ffcc00, #ffee44, #ffffff); animation-duration: 0.19s; animation-delay: 0.06s; position: absolute; bottom: 0; left: 180px; }

  @keyframes flicker {
    0%   { transform: scaleX(1) scaleY(1) skewX(0deg); }
    25%  { transform: scaleX(0.88) scaleY(1.08) skewX(-3deg); }
    50%  { transform: scaleX(1.06) scaleY(0.94) skewX(2deg); }
    75%  { transform: scaleX(0.92) scaleY(1.05) skewX(-2deg); }
    100% { transform: scaleX(1.04) scaleY(0.97) skewX(1deg); }
  }

  .glow-overlay {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 60px;
    background: linear-gradient(to bottom, rgba(255,100,0,0.25), transparent);
    border-radius: 4px;
    animation: glowPulse 0.3s ease-in-out infinite alternate;
    pointer-events: none;
  }

  @keyframes glowPulse {
    0%   { opacity: 0.5; }
    100% { opacity: 1; }
  }

  .wheels {
    display: flex;
    justify-content: space-between;
    width: 240px;
    margin-top: 6px;
  }

  .wheel {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #555, #111);
    border: 3px solid #444;
    position: relative;
  }
  .wheel::after {
    content: '';
    width: 8px; height: 8px;
    background: #666;
    border-radius: 50%;
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
  }

  .sparks-container {
    position: absolute;
    bottom: 165px;
    left: 50%;
    transform: translateX(-50%);
    width: 280px;
    height: 130px;
    pointer-events: none;
    overflow: visible;
  }

  .spark {
    position: absolute;
    width: 4px; height: 4px;
    border-radius: 50%;
    background: #ffdd00;
    animation: sparkFly linear infinite;
  }

  .spark:nth-child(1)  { left: 80px;  animation-duration: 1.1s;  animation-delay: 0s;    background: #ff8800; }
  .spark:nth-child(2)  { left: 140px; animation-duration: 0.9s;  animation-delay: 0.3s;  background: #ffcc00; }
  .spark:nth-child(3)  { left: 110px; animation-duration: 1.3s;  animation-delay: 0.6s;  background: #ff4400; }
  .spark:nth-child(4)  { left: 160px; animation-duration: 0.8s;  animation-delay: 0.1s;  background: #ffee00; }
  .spark:nth-child(5)  { left: 95px;  animation-duration: 1.0s;  animation-delay: 0.8s;  background: #ff6600; }
  .spark:nth-child(6)  { left: 175px; animation-duration: 1.2s;  animation-delay: 0.45s; background: #ffaa00; }
  .spark:nth-child(7)  { left: 60px;  animation-duration: 0.95s; animation-delay: 0.7s;  background: #ff3300; }
  .spark:nth-child(8)  { left: 200px; animation-duration: 1.15s; animation-delay: 0.2s;  background: #ffdd44; }

  @keyframes sparkFly {
    0%   { transform: translateY(0) translateX(0) scale(1); opacity: 1; }
    60%  { opacity: 0.8; }
    100% { transform: translateY(-110px) translateX(var(--drift, 30px)) scale(0.2); opacity: 0; }
  }

  .spark:nth-child(odd)  { --drift:  25px; }
  .spark:nth-child(even) { --drift: -25px; }

  .label {
    margin-top: 32px;
    text-align: center;
  }

  .meta {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 2.6rem;
    letter-spacing: 0.04em;
    line-height: 1;
    animation: textFlicker 0.15s ease-in-out infinite alternate;
  }

  .meta span.meta-part  { color: #ff5500; text-shadow: 0 0 20px rgba(255,85,0,0.8),  0 0 50px rgba(255,60,0,0.4); }
  .meta span.phase-part { color: #ff9900; text-shadow: 0 0 20px rgba(255,153,0,0.8), 0 0 50px rgba(255,120,0,0.4); }

  @keyframes textFlicker {
    0%   { opacity: 1;    filter: brightness(1); }
    100% { opacity: 0.88; filter: brightness(1.2); }
  }

  .label .tagline {
    color: #666;
    font-size: 0.68rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-top: 7px;
  }
  .label .tagline em { color: #ff5500; font-style: normal; }

  .ground-glow {
    width: 280px;
    height: 20px;
    background: radial-gradient(ellipse, rgba(255,80,0,0.3) 0%, transparent 70%);
    margin-top: -4px;
    animation: glowPulse 0.3s ease-in-out infinite alternate;
  }

  /* SOUND BUTTON */
  #soundBtn {
    margin-top: 28px;
    background: transparent;
    border: 2px solid #ff5500;
    color: #ff5500;
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 10px 24px;
    border-radius: 4px;
    cursor: pointer;
    transition: background 0.2s, color 0.2s, box-shadow 0.2s;
  }
  #soundBtn:hover {
    background: #ff5500;
    color: #000;
    box-shadow: 0 0 20px rgba(255,85,0,0.5);
  }
  #soundBtn.active {
    background: #ff5500;
    color: #000;
    box-shadow: 0 0 24px rgba(255,85,0,0.6);
  }
</style>
</head>
<body>

<div class="scene">
  <div class="smoke-container">
    <div class="puff"></div><div class="puff"></div><div class="puff"></div>
    <div class="puff"></div><div class="puff"></div>
  </div>

  <div class="dumpster-wrap">
    <div class="sparks-container">
      <div class="spark"></div><div class="spark"></div><div class="spark"></div>
      <div class="spark"></div><div class="spark"></div><div class="spark"></div>
      <div class="spark"></div><div class="spark"></div>
    </div>

    <div class="flames">
      <div class="flame o1"></div><div class="flame o2"></div><div class="flame o3"></div>
      <div class="flame o4"></div><div class="flame o5"></div>
      <div class="flame i1"></div><div class="flame i2"></div><div class="flame i3"></div>
    </div>

    <div class="lid"><div class="lid-handle"></div></div>
    <div class="dumpster">
      <div class="glow-overlay"></div>
      <div class="dumpster-label">
        <div class="mp-name">MetaPhase</div>
        <div class="mp-tag">Consulting LLC</div>
      </div>
    </div>
    <div class="wheels"><div class="wheel"></div><div class="wheel"></div></div>
    <div class="ground-glow"></div>
  </div>

  <div class="label">
    <div class="meta">
      <span class="meta-part">Meta</span><span class="phase-part">Phase</span>
    </div>
    <div class="tagline">Transformation & <em>Innovation</em> — Est. 🔥</div>
  </div>

  <button id="soundBtn" onclick="toggleSound()">🔥 Ignite Sound</button>
</div>

<script>
  let audioCtx = null;
  let masterGain = null;
  let isPlaying = false;
  let crackleInterval = null;
  let noiseNode = null;
  let noiseGain = null;

  function createAudioContext() {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.setValueAtTime(0.0, audioCtx.currentTime);
    masterGain.gain.linearRampToValueAtTime(1.0, audioCtx.currentTime + 1.5);
    masterGain.connect(audioCtx.destination);
  }

  // Continuous filtered noise = base fire roar
  function startBaseRoar() {
    const bufferSize = audioCtx.sampleRate * 3;
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) {
      data[i] = Math.random() * 2 - 1;
    }

    noiseNode = audioCtx.createBufferSource();
    noiseNode.buffer = buffer;
    noiseNode.loop = true;

    // Low-pass: deep whooshy rumble
    const lpf = audioCtx.createBiquadFilter();
    lpf.type = 'lowpass';
    lpf.frequency.value = 180;
    lpf.Q.value = 0.8;

    // High-pass to remove sub-rumble mud
    const hpf = audioCtx.createBiquadFilter();
    hpf.type = 'highpass';
    hpf.frequency.value = 40;

    noiseGain = audioCtx.createGain();
    noiseGain.gain.value = 0.55;

    noiseNode.connect(hpf);
    hpf.connect(lpf);
    lpf.connect(noiseGain);
    noiseGain.connect(masterGain);
    noiseNode.start();
  }

  // Random crackle pops
  function fireCrackle() {
    const now = audioCtx.currentTime;

    // short burst of white noise shaped with fast attack/decay
    const crackleBuf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.08, audioCtx.sampleRate);
    const cd = crackleBuf.getChannelData(0);
    for (let i = 0; i < cd.length; i++) cd[i] = Math.random() * 2 - 1;

    const src = audioCtx.createBufferSource();
    src.buffer = crackleBuf;

    const hpf = audioCtx.createBiquadFilter();
    hpf.type = 'highpass';
    hpf.frequency.value = 800 + Math.random() * 1400;

    const env = audioCtx.createGain();
    const peak = 0.3 + Math.random() * 0.5;
    env.gain.setValueAtTime(0, now);
    env.gain.linearRampToValueAtTime(peak, now + 0.004);
    env.gain.exponentialRampToValueAtTime(0.001, now + 0.05 + Math.random() * 0.06);

    src.connect(hpf);
    hpf.connect(env);
    env.connect(masterGain);
    src.start(now);
    src.stop(now + 0.12);
  }

  // Occasional low-freq thud (wood shifting in fire)
  function fireThud() {
    const now = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(80 + Math.random() * 40, now);
    osc.frequency.exponentialRampToValueAtTime(30, now + 0.15);

    const env = audioCtx.createGain();
    env.gain.setValueAtTime(0.4 + Math.random() * 0.3, now);
    env.gain.exponentialRampToValueAtTime(0.001, now + 0.18);

    osc.connect(env);
    env.connect(masterGain);
    osc.start(now);
    osc.stop(now + 0.2);
  }

  function scheduleCrackles() {
    // Rapid crackles: 4–12 per second, randomized
    crackleInterval = setInterval(() => {
      const count = 1 + Math.floor(Math.random() * 3);
      for (let i = 0; i < count; i++) {
        setTimeout(fireCrackle, Math.random() * 120);
      }
      // Occasional thud
      if (Math.random() < 0.18) {
        setTimeout(fireThud, Math.random() * 200);
      }
    }, 90 + Math.random() * 80);
  }

  function toggleSound() {
    const btn = document.getElementById('soundBtn');
    if (!isPlaying) {
      if (!audioCtx) createAudioContext();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      startBaseRoar();
      scheduleCrackles();
      isPlaying = true;
      btn.textContent = '🔇 Silence It';
      btn.classList.add('active');
    } else {
      // Fade out then stop
      masterGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.6);
      clearInterval(crackleInterval);
      setTimeout(() => {
        if (noiseNode) { try { noiseNode.stop(); } catch(e){} noiseNode = null; }
        audioCtx.close();
        audioCtx = null;
        masterGain = null;
      }, 700);
      isPlaying = false;
      btn.textContent = '🔥 Ignite Sound';
      btn.classList.remove('active');
    }
  }
</script>
</body>
</html>
